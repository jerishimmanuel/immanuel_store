<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Immanuel Store</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">Immanuel Store</div>
      <nav>
        <a href="/">Products</a>
        <a href="/cart">Cart</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        <a href="/settings">Settings</a>
        <button id="theme-toggle" class="ghost-btn" type="button">🌙</button>
      </nav>
    </header>

    <main>
      <div class="panel form-card">
        <h2>Settings</h2>
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <button id="save-settings" type="button">Save Settings</button>
        <p class="small">Available features: dark mode, dedicated cart page, login/register pages, and order checkout.</p>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
